services:

  # ─────────────────────────────────────
  # User Service Database
  # ─────────────────────────────────────
  user-db:
    image: postgres:15
    container_name: user-db
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: userservice
      POSTGRES_PASSWORD: userpass
    ports:
      - "5432:5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U userservice -d userdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────
  # Transaction Service Database
  # ─────────────────────────────────────
  transaction-db:
    image: postgres:15
    container_name: transaction-db
    environment:
      POSTGRES_DB: transactiondb
      POSTGRES_USER: transactionservice
      POSTGRES_PASSWORD: transactionpass
    ports:
      - "5433:5432"
    volumes:
      - transaction-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transactionservice -d transactiondb"]
      interval: 10s
      timeout: 5s
      retries: 5

# ─────────────────────────────────────
# Persistent Storage
# ─────────────────────────────────────
volumes:
  user-db-data:
  transaction-db-data:
